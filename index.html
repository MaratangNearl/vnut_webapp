<!doctype html>

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" crossorigin="anonymous">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('vnut-settings');
        var lang = 'ko';
        if (saved) {
          var parsed = JSON.parse(saved);
          if (parsed && parsed.state && parsed.state.language) {
            lang = parsed.state.language;
          }
        } else {
          var navLang = navigator.language || navigator.userLanguage || 'ko';
          var shortLang = navLang.split('-')[0].toLowerCase();
          if (shortLang === 'ja') lang = 'ja';
          else if (shortLang === 'ko') lang = 'ko';
          else lang = 'en';
        }
        document.documentElement.setAttribute('lang', lang);
      } catch (e) { }
    })();
  </script>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
